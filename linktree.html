    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #888;
            padding: 40px 20px 60px;
        }

        .card {
            width: 100%;
            max-width: 580px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.25);
        }

        .top-border {
            height: 40px;
            background: #16a34a;
            border-radius: 24px 24px 0 0;
        }

        .card-content {
            padding: 12px 20px 60px;
            text-align: center;
            position: relative;
            background-color: #eef3ec;
            background-image: url("https://ugc.production.linktr.ee/IDYHI1RNSv6TIz2Yzzkc_78UNA0FLDCU37Zwl?io=true&size=1080");
            background-size: contain;
            background-position: center top;
            background-repeat: repeat-y;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 16px;
            background: transparent;
        }

        .card-header button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: background 0.2s;
            color: #000;
        }

        .card-header button:hover {
            background: rgba(255, 255, 255, 1);
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            background: #eee;
            position: relative;
            z-index: 2;
        }

        h1 {
            margin: 14px 0 4px;
            color: #D27AAF;
            font-size: 26px;
            font-weight: 600;
        }

        .subtitle {
            margin: 2px 0;
            font-size: 16px;
            color: #D27AAF;
            font-weight: 600;
        }

        .links-section {
            margin-top: 24px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                #0bab5d;
            color: white;
            text-decoration: none;
            padding: 0 16px;
            margin: 14px 0;
            border-radius: 0px;
            font-weight: 600;
            font-size: 15px;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            height: 56px;
            position: relative;
        }

        .link:hover {
            background: #1cb168;
        }

        .link:active {
            transform: scale(0.97);
        }

        .link-icon {
            position: absolute;
            left: 16px;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-size: 18px;
        }

        .link-label {
            flex: 1;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .link-dots {
            position: absolute;
            right: 16px;
            width: 28px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 16px;
            opacity: 0.6;
        }

        .socials {
            margin-top: 28px;
            margin-bottom: 81px;
            display: flex;
            justify-content: center;
            gap: 0px;
        }

        .socials a {
            text-decoration: none;
            font-size: 22px;
            color: #D27AAF;
            transition: color 0.2s;
        }

        .socials a:hover {
            color: #D27AAF;
        }

        footer {
            font-size: 10px;
            color: #333;
            background: #D27AAF;
            padding: 20px 20px 28px;
            text-align: center;
        }

        footer a,
        footer button {
            font-size: 10px;
            color: #333;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        footer a:hover,
        footer button:hover {
            text-decoration: underline;
        }

        footer span {
            color: #333;
            margin: 0 4px;
        }
    </style>
</head>
